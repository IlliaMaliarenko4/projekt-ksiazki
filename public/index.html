<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Książek</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; max-width: 600px; margin: 40px auto; padding: 20px; }
        form { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { background: #bb86fc; color: #000; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .book-card { background: #1e1e1e; padding: 15px; margin-top: 15px; border-radius: 6px; border: 1px solid #333; }
    </style>
</head>
<body>

    <h1>📚 Katalog Książek (MVP)</h1>
    
    <form id="bookForm">
        <label>Tytuł:</label>
        <input type="text" id="title" required>
        <label>Autor:</label>
        <input type="text" id="author" required>
        <label>Opis:</label>
        <textarea id="description" rows="3" required></textarea>
        <button type="submit">Dodaj książkę</button>
    </form>

    <h2>Lista książek w bazie:</h2>
    <div id="booksList">Ładowanie...</div>

    <script>
        const bookForm = document.getElementById('bookForm');
        const booksList = document.getElementById('booksList');

        async function loadBooks() {
            const res = await fetch('/api/books');
            const books = await res.json();
            booksList.innerHTML = '';
            if(books.length === 0) {
                booksList.innerHTML = '<p>Baza jest pusta.</p>';
                return;
            }
            books.forEach(book => {
                const div = document.createElement('div');
                div.className = 'book-card';
                div.innerHTML = `<h3>${book.title}</h3><p>Autor: ${book.author}</p><p>${book.description}</p>`;
                booksList.appendChild(div);
            });
        }

        bookForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const description = document.getElementById('description').value;

            await fetch('/api/books', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, author, description })
            });

            bookForm.reset();
            loadBooks();
        });

        loadBooks();
    </script>
</body>
</html>
